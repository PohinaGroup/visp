<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#0b0d10"/><text x="100" y="100" fill="#f2f3f5" font-family="Arial" font-size="48" font-weight="700">RESILIENCE IS A STACK, NOT A SWITCH</text>
  <g font-family="Arial" font-size="34"><rect x="120" y="180" width="1360" height="110" fill="#15191f" stroke="#59616d"/><text x="180" y="250" fill="#f2f3f5">1. Conservative bitrate + adaptive encoder</text><rect x="170" y="320" width="1260" height="110" fill="#15191f" stroke="#59616d"/><text x="230" y="390" fill="#f2f3f5">2. SRT latency window + packet retransmission</text><rect x="220" y="460" width="1160" height="110" fill="#15191f" stroke="#59616d"/><text x="280" y="530" fill="#f2f3f5">3. Publisher and OBS automatic reconnect</text><rect x="270" y="600" width="1060" height="110" fill="#15191f" stroke="#59616d"/><text x="330" y="670" fill="#f2f3f5">4. Local OBS fallback keeps destination live</text><rect x="320" y="740" width="960" height="90" fill="none" stroke="#d8ff52" stroke-width="4"/><text x="800" y="798" fill="#d8ff52" text-anchor="middle">5. Bond independent links when fallback is not enough</text></g>
</svg>
