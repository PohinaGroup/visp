name: OBS plugin

on:
  workflow_call:
  pull_request:
    paths:
      - apps/obs-plugin/**
      - .github/workflows/obs-plugin.yml
  push:
    branches: [main]
    paths:
      - apps/obs-plugin/**
      - .github/workflows/obs-plugin.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  OBS_TEMPLATE_REF: 3e7d7ac3b5342cd7d9b88890b9c70b472d1520fc
  PLUGIN_DIR: apps/obs-plugin

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-2022
            artifact: windows-x64
            build_dir: build_x64
          - name: macOS universal
            os: macos-15
            artifact: macos-universal
            build_dir: build_macos
          - name: Ubuntu x86_64
            os: ubuntu-24.04
            artifact: ubuntu-x86_64
            build_dir: build_x86_64

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Fetch pinned OBS build helpers
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: obsproject/obs-plugintemplate
          ref: ${{ env.OBS_TEMPLATE_REF }}
          path: .obs-template

      - name: Stage OBS build helpers
        shell: bash
        run: |
          mkdir -p "$PLUGIN_DIR/.github/actions"
          cp -R .obs-template/.github/scripts "$PLUGIN_DIR/.github/scripts"
          cp -R .obs-template/.github/actions/setup-macos-codesigning \
            "$PLUGIN_DIR/.github/actions/setup-macos-codesigning"
          chmod +x "$PLUGIN_DIR"/.github/scripts/{build,package}-*

      - name: Set up macOS signing
        if: runner.os == 'macOS' && github.event_name == 'release'
        id: codesign
        uses: ./apps/obs-plugin/.github/actions/setup-macos-codesigning
        with:
          codesignIdentity: ${{ secrets.MACOS_SIGNING_APPLICATION_IDENTITY }}
          installerIdentity: ${{ secrets.MACOS_SIGNING_INSTALLER_IDENTITY }}
          codesignCertificate: ${{ secrets.MACOS_SIGNING_CERT }}
          certificatePassword: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
          keychainPassword: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          notarizationUser: ${{ secrets.MACOS_NOTARIZATION_USERNAME }}
          notarizationPassword: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}

      - name: Require macOS release credentials
        if: runner.os == 'macOS' && github.event_name == 'release'
        shell: bash
        run: |
          test "${{ steps.codesign.outputs.haveCodesignIdent }}" = true
          test "${{ steps.codesign.outputs.haveNotarizationUser }}" = true

      - name: Install Ubuntu build tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes zsh ccache

      - name: Build Windows
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: apps/obs-plugin
        run: ./.github/scripts/Build-Windows.ps1 -Target x64 -Configuration Release

      - name: Build macOS
        if: runner.os == 'macOS' && github.event_name != 'release'
        shell: zsh --no-rcs --errexit --pipefail {0}
        working-directory: apps/obs-plugin
        run: .github/scripts/build-macos --config Release

      - name: Build signed macOS release
        if: runner.os == 'macOS' && github.event_name == 'release'
        shell: zsh --no-rcs --errexit --pipefail {0}
        working-directory: apps/obs-plugin
        env:
          CODESIGN_IDENT: ${{ steps.codesign.outputs.codesignIdent }}
          CODESIGN_TEAM: ${{ steps.codesign.outputs.codesignTeam }}
        run: .github/scripts/build-macos --config Release --codesign

      - name: Build Ubuntu
        if: runner.os == 'Linux'
        shell: zsh --no-rcs --errexit --pipefail {0}
        working-directory: apps/obs-plugin
        run: .github/scripts/build-ubuntu --target ubuntu-x86_64 --config Release

      - name: Test
        shell: bash
        run: ctest --test-dir "$PLUGIN_DIR/${{ matrix.build_dir }}" -C Release --output-on-failure

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: apps/obs-plugin
        run: ./.github/scripts/Package-Windows.ps1 -Target x64 -Configuration Release

      - name: Package macOS
        if: runner.os == 'macOS' && github.event_name != 'release'
        shell: zsh --no-rcs --errexit --pipefail {0}
        working-directory: apps/obs-plugin
        run: .github/scripts/package-macos --config Release --package

      - name: Package and notarize macOS release
        if: runner.os == 'macOS' && github.event_name == 'release'
        shell: zsh --no-rcs --errexit --pipefail {0}
        working-directory: apps/obs-plugin
        env:
          CODESIGN_IDENT: ${{ steps.codesign.outputs.codesignIdent }}
          CODESIGN_IDENT_INSTALLER: ${{ steps.codesign.outputs.installerIdent }}
          CODESIGN_IDENT_USER: ${{ secrets.MACOS_NOTARIZATION_USERNAME }}
          CODESIGN_IDENT_PASS: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
        run: .github/scripts/package-macos --config Release --package --notarize

      - name: Package Ubuntu
        if: runner.os == 'Linux'
        shell: zsh --no-rcs --errexit --pipefail {0}
        working-directory: apps/obs-plugin
        run: .github/scripts/package-ubuntu --target ubuntu-x86_64 --config Release --package

      - name: Upload package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: visp-obs-${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            apps/obs-plugin/release/*.zip
            apps/obs-plugin/release/*.pkg
            apps/obs-plugin/release/*.deb
            apps/obs-plugin/release/*.ddeb
            apps/obs-plugin/release/*.tar.xz

  release:
    name: Attach release packages
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          merge-multiple: true
          path: dist

      - name: Add checksums
        run: cd dist && sha256sum * > SHA256SUMS.txt

      - name: Attach packages to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "$GITHUB_REF_NAME" dist/* --clobber
